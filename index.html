<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tynk — Mobile & Software Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0f172a;
    --blue:   #2563eb;
    --sky:    #eff6ff;
    --ice:    #f8faff;
    --slate:  #64748b;
    --white:  #ffffff;
    --c-red:    #E8441E;
    --c-purple: #A855F7;
    --c-teal:   #0D9488;
    --c-amber:  #F59E0B;
    --c-blue:   #2563EB;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 22px;
    --radius-xl: 32px;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--white);
    color: var(--navy);
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── LOGOMARK ── */
  .logomark {
    display: inline-grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 2.5px; width: 26px; height: 26px;
    background: #111122; border-radius: 6px; padding: 4px; flex-shrink: 0;
  }
  .logomark span { border-radius: 2px; display: block; }
  .logomark-lg {
    display: inline-grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 3.5px; width: 40px; height: 40px;
    background: #111122; border-radius: 10px; padding: 6px; flex-shrink: 0;
  }
  .logomark-lg span { border-radius: 2.5px; display: block; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 5%;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(15,23,42,0.06);
  }
  .logo-wrap { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.25rem; font-weight: 700; color: var(--navy); letter-spacing: -0.03em;
  }
  .nav-right { display: flex; align-items: center; gap: 2.2rem; }
  nav ul { list-style: none; display: flex; gap: 2.2rem; }
  nav ul a {
    text-decoration: none; color: var(--slate);
    font-size: 0.84rem; font-weight: 500; transition: color 0.2s;
  }
  nav ul a:hover { color: var(--navy); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--navy); color: var(--white) !important;
    padding: 0.5rem 1.2rem; border-radius: 50px;
    font-size: 0.84rem !important; font-weight: 500 !important;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--blue) !important; }

  /* ── LANGUAGE SWITCHER ── */
  .lang-switcher {
    display: flex; align-items: center; gap: 2px;
    background: var(--ice);
    border: 1px solid rgba(15,23,42,0.08);
    border-radius: 50px;
    padding: 3px;
    flex-shrink: 0;
  }
  .lang-btn {
    background: transparent; border: none; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
    color: var(--slate);
    padding: 0.3rem 0.6rem; border-radius: 50px;
    transition: background 0.15s, color 0.15s;
    line-height: 1;
  }
  .lang-btn:hover { color: var(--navy); }
  .lang-btn.active {
    background: var(--navy); color: var(--white);
  }

  /* ── DOT CLUSTER ── */
  .dot-cluster { display: inline-flex; gap: 3px; align-items: center; }
  .dot-cluster span { border-radius: 2px; display: block; }

  /* ── SECTION TAG ── */
  .section-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--slate); margin-bottom: 1rem;
  }
  .section-tag .tag-dots { display: inline-flex; gap: 3px; }
  .section-tag .tag-dots span { width: 6px; height: 6px; border-radius: 1.5px; display: block; }

  .section-title {
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700;
    font-size: clamp(1.9rem, 3.5vw, 2.8rem);
    color: var(--navy); line-height: 1.18; letter-spacing: -0.03em; margin-bottom: 1.1rem;
  }
  .section-title em { font-style: normal; color: var(--blue); }
  .section-sub { color: var(--slate); max-width: 500px; font-size: 1rem; line-height: 1.8; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh; display: flex; align-items: center;
    padding: 8rem 5% 5rem; position: relative; overflow: hidden;
  }
  .hero-blob {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.45;
  }
  .hero-blob.b1 { width: 500px; height: 500px; background: #dbeafe; top: -120px; right: -60px; }
  .hero-blob.b2 { width: 280px; height: 280px; background: #fef3c7; bottom: 60px; left: 8%; }
  .hero-blob.b3 { width: 200px; height: 200px; background: #f3e8ff; top: 40%; right: 20%; }
  .hero-inner { max-width: 700px; position: relative; z-index: 1; }

  .hero-tag-wrap {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--sky); border: 1px solid rgba(37,99,235,0.12);
    padding: 0.4rem 1rem 0.4rem 0.6rem; border-radius: 50px; margin-bottom: 2.2rem;
  }
  .hero-tag-text {
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--blue);
  }

  .hero h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: clamp(2.8rem, 5.5vw, 4.2rem); font-weight: 700;
    line-height: 1.12; color: var(--navy); margin-bottom: 1.6rem; letter-spacing: -0.04em;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--c-blue) 0%, var(--c-purple) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero-desc { font-size: 1.05rem; color: var(--slate); max-width: 520px; margin-bottom: 2.5rem; line-height: 1.85; }

  /* ── BUTTONS ── */
  .btn-group { display: flex; gap: 0.85rem; flex-wrap: wrap; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--navy); color: var(--white);
    padding: 0.85rem 1.9rem; border-radius: var(--radius-md);
    text-decoration: none; font-weight: 600; font-size: 0.9rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: #1e3a8a; transform: translateY(-1px); }
  .btn-icon {
    display: grid; grid-template-columns: repeat(2,1fr);
    gap: 2.5px; width: 16px; height: 16px; flex-shrink: 0;
  }
  .btn-icon span { border-radius: 2px; display: block; }

  .btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: var(--navy);
    padding: 0.85rem 1.9rem; border-radius: var(--radius-md);
    text-decoration: none; font-weight: 600; font-size: 0.9rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    border: 1.5px solid rgba(15,23,42,0.15);
    transition: border-color 0.2s, color 0.2s, transform 0.15s;
  }
  .btn-secondary:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-1px); }

  .btn-light {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--white); color: var(--navy);
    padding: 0.9rem 2rem; border-radius: var(--radius-md);
    text-decoration: none; font-weight: 700; font-size: 0.9rem;
    font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.2s, transform 0.15s;
  }
  .btn-light:hover { background: var(--sky); transform: translateY(-1px); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: rgba(255,255,255,0.7);
    padding: 0.9rem 2rem; border-radius: var(--radius-md);
    text-decoration: none; font-weight: 600; font-size: 0.9rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    border: 1.5px solid rgba(255,255,255,0.15);
    transition: border-color 0.2s, color 0.2s, transform 0.15s;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.4); color: var(--white); transform: translateY(-1px); }

  /* ── STATS ── */
  .hero-stats {
    display: flex; gap: 3rem; margin-top: 4rem;
    padding-top: 2.5rem; border-top: 1px solid rgba(15,23,42,0.07);
  }
  .stat-num {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.9rem; font-weight: 700; color: var(--navy); line-height: 1; letter-spacing: -0.03em;
  }
  .stat-label { font-size: 0.8rem; color: var(--slate); margin-top: 0.3rem; font-weight: 500; }

  /* ── TRUST STRIP ── */
  .trust { background: var(--navy); padding: 4.5rem 5%; }
  .trust-inner { max-width: 1100px; margin: 0 auto; }
  .trust-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(255,255,255,0.06); border-radius: var(--radius-lg); overflow: hidden; }
  .trust-cell { background: #0f172a; padding: 2.5rem; }
  .trust-icon {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    margin-bottom: 1.4rem;
    display: grid; grid-template-columns: repeat(2,1fr);
    gap: 3px; padding: 5px; background: rgba(255,255,255,0.06);
  }
  .trust-icon span { border-radius: 2px; display: block; opacity: 0.9; }
  .trust-cell h3 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 0.6rem;
  }
  .trust-cell p { font-size: 0.87rem; color: rgba(255,255,255,0.45); line-height: 1.8; }

  /* ── ABOUT ── */
  .about { background: var(--ice); padding: 6rem 5%; }
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; max-width: 1100px; margin: 0 auto; }
  .about-text p { color: var(--slate); line-height: 1.9; margin-bottom: 1.2rem; }
  .about-card {
    background: var(--white); border-radius: var(--radius-lg);
    border: 1px solid rgba(15,23,42,0.07); padding: 2.2rem;
    box-shadow: 0 8px 40px rgba(15,23,42,0.05);
  }
  .about-card-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 1.6rem;
    padding-bottom: 1.4rem; border-bottom: 1px solid rgba(15,23,42,0.06);
  }
  .about-card-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; font-weight: 700; color: var(--navy); }
  .about-card-sub { font-size: 0.82rem; color: var(--slate); }
  .pill-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--sky); color: var(--blue);
    padding: 0.35rem 0.9rem; border-radius: 50px;
    font-size: 0.8rem; font-weight: 600; border: 1px solid rgba(37,99,235,0.1);
  }
  .pill .pd { width: 5px; height: 5px; border-radius: 1px; display: block; }
  .about-card > p { color: var(--slate); font-size: 0.9rem; line-height: 1.8; }

  /* ── EXPERTISE ── */
  .expertise { background: var(--white); padding: 6rem 5%; }
  .expertise-inner { max-width: 1100px; margin: 0 auto; }
  .expertise-header { margin-bottom: 3.5rem; }
  .expertise-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
  .expertise-item {
    background: var(--ice); border: 1px solid rgba(15,23,42,0.06);
    border-radius: var(--radius-md); padding: 1.8rem;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .expertise-item:hover {
    border-color: rgba(37,99,235,0.2); transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(37,99,235,0.07);
  }
  .exp-dot {
    width: 28px; height: 28px; border-radius: 7px; margin-bottom: 1.3rem;
    display: flex; align-items: center; justify-content: center;
  }
  .exp-dot svg { width: 14px; height: 14px; }
  .expertise-item h3 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem; font-weight: 700; color: var(--navy); margin-bottom: 0.5rem;
  }
  .expertise-item p { font-size: 0.86rem; color: var(--slate); line-height: 1.75; }
  .exp-num {
    position: absolute; top: 1.4rem; right: 1.4rem;
    font-size: 0.72rem; font-weight: 700; color: rgba(15,23,42,0.12);
    font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 0.05em;
  }

  /* ── SERVICES ── */
  .services { background: var(--navy); padding: 6rem 5%; }
  .services-inner { max-width: 1100px; margin: 0 auto; }
  .services .section-title { color: var(--white); }
  .services .section-tag { color: rgba(255,255,255,0.4); }
  .services .section-sub { color: rgba(255,255,255,0.45); }
  .services-header { margin-bottom: 3.5rem; }
  .services-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 1px; background: rgba(255,255,255,0.06); border-radius: var(--radius-lg); overflow: hidden;
  }
  .service-cell { background: #0f172a; padding: 2.5rem; transition: background 0.2s; }
  .service-cell:hover { background: #1a2744; }
  .service-tile {
    width: 36px; height: 36px; border-radius: var(--radius-sm); margin-bottom: 1.4rem;
    display: grid; grid-template-columns: repeat(2,1fr);
    gap: 3px; padding: 6px; background: rgba(255,255,255,0.06);
  }
  .service-tile span { border-radius: 2px; display: block; opacity: 0.85; }
  .service-cell h3 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.05rem; font-weight: 700; color: var(--white); margin-bottom: 0.6rem;
  }
  .service-cell p { font-size: 0.87rem; color: rgba(255,255,255,0.45); line-height: 1.8; }

  /* ── APPS ── */
  .apps { background: var(--ice); padding: 6rem 5%; }
  .apps-inner { max-width: 1100px; margin: 0 auto; }
  .apps-header { margin-bottom: 3.5rem; }
  .apps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
  .app-card {
    background: var(--white); border: 1px solid rgba(15,23,42,0.07);
    border-radius: var(--radius-lg); overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .app-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(15,23,42,0.09); }
  .app-preview { height: 160px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .app-preview-bg { position: absolute; inset: 0; }
  .app-preview-icon {
    position: relative; z-index: 1; width: 60px; height: 60px;
    background: #111122; border-radius: 14px;
    display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
    gap: 3.5px; padding: 9px;
  }
  .app-preview-icon span { border-radius: 2px; display: block; }
  .app-info { padding: 1.4rem; }
  .app-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--sky); color: var(--blue);
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 0.22rem 0.65rem; border-radius: 50px; margin-bottom: 0.75rem;
    border: 1px solid rgba(37,99,235,0.1);
  }
  .app-badge .bd { width: 5px; height: 5px; border-radius: 1px; display: block; }
  .app-info h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 0.4rem; }
  .app-info p { font-size: 0.84rem; color: var(--slate); line-height: 1.7; }
  .app-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.82rem; font-weight: 700; color: var(--blue);
    font-family: 'Plus Jakarta Sans', sans-serif;
    text-decoration: none; margin-top: 1rem; transition: gap 0.15s;
  }
  .app-link:hover { gap: 7px; }

  /* ── CTA ── */
  .cta { background: var(--white); padding: 7rem 5%; text-align: center; }
  .cta-box {
    background: var(--navy); border-radius: var(--radius-xl);
    padding: 5rem 3rem; max-width: 780px; margin: 0 auto; position: relative; overflow: hidden;
  }
  .cta-blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.2; }
  .cta-blob.cb1 { width: 300px; height: 300px; background: #2563eb; top:-80px; right:-60px; }
  .cta-blob.cb2 { width: 200px; height: 200px; background: #a855f7; bottom:-40px; left:10%; }
  .cta-content { position: relative; z-index: 1; }
  .cta-box .section-tag { color: rgba(255,255,255,0.4); margin-bottom: 0.8rem; }
  .cta-box .section-title { color: var(--white); margin-bottom: 1rem; }
  .cta-box .section-title em {
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .cta-content > p { color: rgba(255,255,255,0.5); margin-bottom: 2.5rem; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.8; }
  .cta-box .btn-group { justify-content: center; }

  /* ── FOOTER ── */
  footer {
    background: var(--ice); padding: 2rem 5%;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(15,23,42,0.06);
  }
  footer p { font-size: 0.8rem; color: var(--slate); }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    nav ul { display: none; }
    .lang-switcher { gap: 1px; }
    .lang-btn { padding: 0.28rem 0.5rem; font-size: 0.68rem; }
  }
  @media (max-width: 768px) {
    .about-grid, .expertise-grid, .apps-grid, .trust-grid { grid-template-columns: 1fr; }
    .services-grid { grid-template-columns: 1fr; }
    .hero-stats { gap: 1.8rem; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="logo-wrap">
    <div class="logomark">
      <span style="background:var(--c-red)"></span><span style="background:var(--c-purple)"></span><span style="background:var(--c-teal)"></span>
      <span style="background:transparent"></span><span style="background:var(--c-amber)"></span><span style="background:transparent"></span>
      <span style="background:transparent"></span><span style="background:var(--c-blue)"></span><span style="background:transparent"></span>
    </div>
    <span class="logo-text">tynk</span>
  </a>
  <div class="nav-right">
    <ul>
      <li><a href="#about" data-i18n="nav_about"></a></li>
      <li><a href="#expertise" data-i18n="nav_expertise"></a></li>
      <li><a href="#services" data-i18n="nav_services"></a></li>
      <li><a href="#apps" data-i18n="nav_apps"></a></li>
      <li><a href="#contact" class="nav-cta" data-i18n="nav_contact"></a></li>
    </ul>
    <div class="lang-switcher" id="langSwitcher">
      <button class="lang-btn active" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="pt">PT</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-blob b1"></div>
  <div class="hero-blob b2"></div>
  <div class="hero-blob b3"></div>
  <div class="hero-inner">
    <div class="hero-tag-wrap">
      <div class="dot-cluster">
        <span style="background:var(--c-red);width:8px;height:8px;border-radius:2px"></span>
        <span style="background:var(--c-purple);width:8px;height:8px;border-radius:2px"></span>
        <span style="background:var(--c-teal);width:8px;height:8px;border-radius:2px"></span>
        <span style="background:var(--c-amber);width:8px;height:8px;border-radius:2px"></span>
        <span style="background:var(--c-blue);width:8px;height:8px;border-radius:2px"></span>
      </div>
      <span class="hero-tag-text">Mobile & Software Studio</span>
    </div>
    <h1 data-i18n="hero_h1"></h1>
    <p class="hero-desc" data-i18n="hero_p"></p>
    <div class="btn-group">
      <a href="#apps" class="btn-primary">
        <div class="btn-icon">
          <span style="background:var(--c-red)"></span><span style="background:var(--c-purple)"></span>
          <span style="background:var(--c-amber)"></span><span style="background:var(--c-blue)"></span>
        </div>
        <span data-i18n="hero_btn1"></span>
      </a>
      <a href="#contact" class="btn-secondary" data-i18n="hero_btn2"></a>
    </div>
    <div class="hero-stats">
      <div>
        <div class="stat-num">12+</div>
        <div class="stat-label" data-i18n="stat1"></div>
      </div>

let currentLang = 'ru';

function applyTranslations(lang) {
  const t = translations[lang];
  if (!t) return;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  document.documentElement.lang = lang;
  currentLang = lang;
}

document.getElementById('langSwitcher').addEventListener('click', (e) => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  const lang = btn.dataset.lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyTranslations(lang);
});

// Init
applyTranslations('ru');
